<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두 칸 랜덤 배경색</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #111827;
      overflow: hidden;
    }

    .color-panel {
      height: 50vh;
      display: grid;
      place-items: center;
      transition: background-color 0.35s ease;
    }

    #topPanel {
      background: #f97316;
    }

    #bottomPanel {
      background: #22c55e;
    }

    .panel-label {
      padding: 10px 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      font-family: Consolas, Monaco, monospace;
      font-size: 18px;
      font-weight: 700;
    }

    .controls {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(90vw, 360px);
      padding: 22px;
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(10px);
      transform: translate(-50%, -50%);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.25;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <section class="color-panel" id="topPanel" aria-label="위쪽 배경색">
    <span class="panel-label" id="topColorValue">#F97316</span>
  </section>

  <section class="color-panel" id="bottomPanel" aria-label="아래쪽 배경색">
    <span class="panel-label" id="bottomColorValue">#22C55E</span>
  </section>

  <main class="controls">
    <h1>두 칸 랜덤 배경색</h1>
    <button id="changeColorButton" type="button">색상 바꾸기</button>
  </main>

  <script>
    const button = document.getElementById("changeColorButton");
    const topPanel = document.getElementById("topPanel");
    const bottomPanel = document.getElementById("bottomPanel");
    const topColorValue = document.getElementById("topColorValue");
    const bottomColorValue = document.getElementById("bottomColorValue");

    function getRandomColor() {
      const hex = Math.floor(Math.random() * 0xffffff)
        .toString(16)
        .padStart(6, "0")
        .toUpperCase();

      return `#${hex}`;
    }

    button.addEventListener("click", () => {
      const topColor = getRandomColor();
      const bottomColor = getRandomColor();

      topPanel.style.backgroundColor = topColor;
      bottomPanel.style.backgroundColor = bottomColor;
      topColorValue.textContent = topColor;
      bottomColorValue.textContent = bottomColor;
    });
  </script>
</body>
</html>
